<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CoderFire — Engenharia sênior, forjada no Brasil.</title>
  <meta name="description" content="Times de produto terceirizados e consultoria em IA/IoT de Joinville, SC. Apenas engenheiros sênior. Entregamos na Pinterest, Accenture, BairesDev." />
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="colors_and_type.css">
  <link rel="stylesheet" href="styles.css">

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>
    window.FORMSPREE_BOOKING_FORM_ID = window.FORMSPREE_BOOKING_FORM_ID || 'xbdbpzqz';
  </script>

</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="i18n.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="sections.jsx"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      const [modalOpen, setModalOpen] = useState(false);
      const [lang, setLang] = useState(() => detectLang());

      useEffect(() => {
        document.documentElement.lang = lang === 'pt' ? 'pt-BR' : 'en-US';
        document.title = translations[lang].meta.title;
      }, [lang]);

      return (
        <LangContext.Provider value={lang}>
          <Nav onCta={() => setModalOpen(true)} lang={lang} onLangChange={setLang} />
          <Hero onCta={() => setModalOpen(true)} />
          <LogoStrip />
          <Services onCta={() => setModalOpen(true)} />
          <Capabilities />
          <CaseStudies />
          <Industries />
          {/** <HowWeWork /> */}
          <Leadership />
          <CtaBanner onCta={() => setModalOpen(true)} />
          <Footer />
          <BookingModal open={modalOpen} onClose={() => setModalOpen(false)} />
        </LangContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
